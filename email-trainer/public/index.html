<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark;">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✉️ Email Trainer</title>

  <!-- Tailwind CSS (dark mode via class strategy) -->
  <script>
    // Must run before Tailwind CDN loads
    window.tailwindConfig = {
      darkMode: 'class',
      theme: { extend: {} },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- canvas-confetti (loaded before Alpine so triggerConfetti() is available) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- Phosphor Icons -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">

  <!-- App logic (must be before Alpine) -->
  <script src="/js/app.js"></script>

  <!-- Alpine.js (deferred — starts after DOM ready) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-gray-950 text-gray-100" x-data="app()" style="height: 100vh; overflow: hidden;">

  <!-- =========================================================================
     Layout: sidebar + main
     ========================================================================= -->
  <div class="flex h-screen overflow-hidden">

    <!-- =====================================================================
       Sidebar
       ===================================================================== -->
    <aside class="sidebar-full w-64 flex-shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col">

      <!-- Header -->
      <div class="px-4 py-4 border-b border-gray-800">
        <div class="flex items-center gap-2">
          <span class="text-2xl">✉️</span>
          <div>
            <h1 class="sidebar-label text-sm font-bold text-white leading-tight">Email Trainer</h1>
            <p class="sidebar-label text-xs text-gray-500 leading-tight">Personal Email Triage</p>
          </div>
        </div>

        <!-- WS status indicator -->
        <div class="flex items-center gap-1.5 mt-3">
          <div class="w-2 h-2 rounded-full flex-shrink-0" :class="{
            'bg-green-500 ws-dot-pulse': wsStatus === 'connected',
            'bg-yellow-500 ws-dot-pulse': wsStatus === 'connecting',
            'bg-red-500': wsStatus === 'disconnected'
          }"></div>
          <span class="sidebar-label text-xs text-gray-500" x-text="wsStatus"></span>
        </div>
      </div>

      <!-- Stage filters -->
      <nav class="flex-1 sidebar-scroll overflow-y-auto p-2 space-y-0.5">

        <!-- Section header row with expand toggle -->
        <div class="flex items-center justify-between px-1 pb-1">
          <span class="text-xs text-gray-600 uppercase tracking-widest">Stages</span>
          <button @click="clickEyeToggle()" :title="showAllStages ? 'Show active stages only' : 'Show all stages'"
            class="p-1 rounded text-gray-600 hover:text-gray-300 hover:bg-gray-800 transition-colors">
            <i x-show="!showAllStages" class="ph-bold ph-eye text-sm" aria-hidden="true"></i>
            <i x-show="showAllStages" class="ph-bold ph-eye-slash text-sm" aria-hidden="true"></i>
          </button>
        </div>

        <!-- All / unfiltered -->
        <button @click="setView('triage'); filter = null; focusedId = null"
          class="w-full flex items-center justify-between px-3 py-2 rounded-lg transition-colors hover:bg-gray-800"
          :class="{ 'bg-gray-800': view === 'triage' && filter === null }">
          <span class="sidebar-label text-sm font-medium text-gray-300">All Emails</span>
          <span class="count-badge bg-gray-700 text-gray-200" x-text="entities.length"></span>
        </button>

        <!-- Per-stage filters -->
        <template x-for="stage in visibleStages" :key="stage.id">
          <button @click="setView('triage'); clickStageFilter(stage.id)"
            class="w-full flex items-center justify-between px-3 py-2 rounded-lg transition-colors hover:bg-gray-800"
            :class="{ 'bg-gray-800/80 ring-1 ring-inset': filter === stage.id }"
            :style="{ '--tw-ring-color': filter === stage.id ? `${stageColor(stage.id)}40` : null }">
            <span class="flex items-center gap-1.5 min-w-0">
              <span x-text="stage.emoji" class="text-sm flex-shrink-0"></span>
              <span class="sidebar-label text-sm text-gray-300 truncate" x-text="stage.label"></span>
              <!-- 👤 human gate badge -->
              <template x-if="stage.human">
                <span class="sidebar-label text-xs text-gray-500">👤</span>
              </template>
            </span>
            <span class="count-badge text-white flex-shrink-0 count-badge-wrap"
              :style="`background-color: ${stageColor(stage.id)}`" x-text="stageCounts[stage.id]"></span>
          </button>
        </template>
      </nav>

      <!-- Training section -->
      <nav class="flex-shrink-0 border-t border-gray-800 p-2 space-y-0.5">
        <div class="px-1 pb-1 pt-0.5">
          <span class="text-xs text-gray-600 uppercase tracking-widest">Training</span>
        </div>
        <button @click="setView('operator-history'); filter = null"
          class="w-full flex items-center gap-2 px-3 py-2 rounded-lg transition-colors hover:bg-gray-800"
          :class="{ 'bg-gray-800': view === 'operator-history' }">
          <span class="text-sm">📋</span>
          <span class="sidebar-label text-sm text-gray-300">Operator History</span>
        </button>
        <button @click="setView('trial-history'); filter = null"
          class="w-full flex items-center gap-2 px-3 py-2 rounded-lg transition-colors hover:bg-gray-800"
          :class="{ 'bg-gray-800': view === 'trial-history' }">
          <span class="text-sm">🧪</span>
          <span class="sidebar-label text-sm text-gray-300">Trial History</span>
        </button>
      </nav>

      <!-- Footer stats + hotkey hints -->
      <div class="p-3 border-t border-gray-800 text-xs text-gray-500 space-y-1">
        <div class="sidebar-label flex justify-between">
          <span>Total</span>
          <span class="font-mono" x-text="entities.length"></span>
        </div>
        <div class="sidebar-label flex justify-between">
          <span>✏️ Awaiting input</span>
          <span class="font-mono text-yellow-400" x-text="stageCounts['awaiting_input'] || 0"></span>
        </div>
        <div class="sidebar-label flex justify-between">
          <span>☑️ Awaiting approval</span>
          <span class="font-mono text-blue-400" x-text="stageCounts['awaiting_approval'] || 0"></span>
        </div>

        <!-- Hotkey hints — context-sensitive to focused card stage -->
        <div class="sidebar-label pt-2 border-t border-gray-800 space-y-0.5 text-gray-700 leading-relaxed">
          <div><kbd class="bg-gray-800 px-1 rounded text-gray-500">j</kbd>/<kbd
              class="bg-gray-800 px-1 rounded text-gray-500">k</kbd> navigate</div>

          <!-- awaiting_input hotkeys -->
          <template x-if="focusedStageId === 'awaiting_input'">
            <div class="space-y-0.5">
              <div><kbd class="bg-gray-800 px-1 rounded text-gray-500">p</kbd> proceed &nbsp; <kbd
                  class="bg-gray-800 px-1 rounded text-gray-500">s</kbd> skip &nbsp; <kbd
                  class="bg-gray-800 px-1 rounded text-gray-500">d</kbd> delete</div>
              <div><kbd class="bg-gray-800 px-1 rounded text-gray-500">a</kbd> archive</div>
            </div>
          </template>

          <!-- awaiting_approval hotkeys -->
          <template x-if="focusedStageId === 'awaiting_approval'">
            <div>
              <div><kbd class="bg-gray-800 px-1 rounded text-gray-500">a</kbd> approve</div>
            </div>
          </template>

          <!-- skipped hotkeys -->
          <template x-if="focusedStageId === 'skipped'">
            <div>
              <div><kbd class="bg-gray-800 px-1 rounded text-gray-500">r</kbd> re-process</div>
            </div>
          </template>

          <!-- no focused card or other stage -->
          <template
            x-if="!focusedStageId || !['awaiting_input','awaiting_approval','skipped'].includes(focusedStageId)">
            <div class="text-gray-800 italic">— no actions —</div>
          </template>

          <div class="pt-0.5"><kbd class="bg-gray-800 px-1 rounded text-gray-500">f</kbd> filter &nbsp; <kbd
              class="bg-gray-800 px-1 rounded text-gray-500">Esc</kbd> clear</div>
        </div>
      </div>
    </aside>

    <!-- =====================================================================
       Main content
       ===================================================================== -->
    <main class="flex-1 min-w-0 flex flex-col">

      <!-- Sticky top bar (triage only) -->
      <div x-show="view === 'triage'"
        class="sticky top-0 bg-gray-950/90 backdrop-blur-sm border-b border-gray-800 px-5 py-2.5 flex items-center justify-between z-10 flex-shrink-0">
        <div class="flex items-center gap-3">
          <template x-if="filter">
            <div class="flex items-center gap-2">
              <span class="text-xs text-gray-500">Filter:</span>
              <span class="px-2 py-0.5 rounded-full text-xs font-semibold text-black/80"
                :style="`background-color: ${stageColor(filter)}`"
                x-text="stages.find(s => s.id === filter)?.label || filter"></span>
              <button @click="filter = null"
                class="text-gray-500 hover:text-gray-300 text-xs leading-none ml-1">✕</button>
            </div>
          </template>
          <span class="text-xs text-gray-500">
            <span x-text="filteredEntities.length"></span>
            <span x-text="filter ? ' in stage' : ' total'"></span>
          </span>
        </div>

        <!-- Legend: human gates -->
        <div class="flex items-center gap-3 text-xs text-gray-600">
          <span>👤 human operator</span>
        </div>
      </div>

      <!-- Feed (triage view) -->
      <div class="main-scroll flex-1" x-show="view === 'triage'">
        <div class="max-w-2xl mx-auto px-4 py-6 space-y-4">

          <!-- Empty state -->
          <template x-if="filteredEntities.length === 0 && wsStatus === 'connected'">
            <div class="text-center py-28 select-none">
              <div class="text-7xl mb-4">🎉</div>
              <h2 class="text-2xl font-bold text-gray-200">
                <template x-if="!filter"><span>You've reached the end!</span></template>
                <template x-if="filter"><span>Nothing in this stage</span></template>
              </h2>
              <p class="text-gray-500 mt-2">
                <template x-if="!filter"><span>No emails waiting for triage. Great work! 🌟</span></template>
                <template x-if="filter">
                  <span>
                    No emails in
                    <span class="font-medium text-gray-400"
                      x-text="stages.find(s => s.id === filter)?.label || filter"></span>.
                  </span>
                </template>
              </p>
              <template x-if="filter">
                <button @click="filter = null"
                  class="mt-5 px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-300 transition-colors">Clear
                  filter</button>
              </template>
            </div>
          </template>

          <!-- Connecting state -->
          <template x-if="filteredEntities.length === 0 && wsStatus !== 'connected'">
            <div class="text-center py-28">
              <div class="spinner mx-auto mb-4" style="width:2.5rem;height:2.5rem;border-width:3px;"></div>
              <p class="text-gray-500 text-sm" x-text="wsStatus === 'connecting' ? 'Connecting…' : 'Reconnecting…'"></p>
            </div>
          </template>

          <!-- ================================================================
             Entity cards — 10 fixed slots, cards fade in/out as queue drains
             ================================================================ -->

          <template x-for="(slot, slotIdx) in slots" :key="slotIdx">
            <div>
              <!-- Filled slot: entity card fades in/out -->
              <template x-if="slot.entityId && getEntityById(slot.entityId)">
                <div x-data="{ get entity() { return getEntityById(slot.entityId); } }"
                  x-transition:enter="transition-opacity duration-300" x-transition:enter-start="opacity-0"
                  x-transition:enter-end="opacity-100" x-transition:leave="transition-opacity duration-200"
                  x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
                  <article data-entity-card :data-entity-id="entity.id"
                    class="entity-card rounded-xl border bg-gray-900 overflow-hidden" :class="{
                    'border-blue-500/50':  getStage(entity).id === 'awaiting_approval' && focusedId !== entity.id,
                    'border-gray-700/80':  getStage(entity).id !== 'awaiting_approval' && focusedId !== entity.id,
                    'entity-exiting':      entity._deleting,
                    'border-transparent ring-2 ring-indigo-400/60 card-focused': focusedId === entity.id,
                  }" @click="focusedId = entity.id"
                    x-effect="if (focusedId === entity.id) $nextTick(() => $el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }))">

                    <!-- Card content -->
                    <div>
                      <div class="px-4 pt-4 pb-3 border-b border-gray-800/60">
                        <div class="flex items-start justify-between gap-3">
                          <!-- From + Subject -->
                          <div class="min-w-0 flex-1">
                            <div class="text-xs text-gray-500 truncate" x-text="entity.envelope?.from || '—'"></div>
                            <h2 class="text-sm font-semibold text-white mt-0.5 leading-snug"
                              x-text="entity.envelope?.subject || entity.id"></h2>
                          </div>
                          <!-- Date + Stage badge -->
                          <div class="flex-shrink-0 flex flex-col items-end gap-1.5">
                            <span class="text-xs text-gray-600 whitespace-nowrap"
                              x-text="formatDate(entity.envelope?.date)"></span>
                            <span class="px-2 py-0.5 rounded-full text-xs font-semibold text-black/80 whitespace-nowrap"
                              :style="`background-color: ${stageColor(getStage(entity).id)}`"
                              x-text="getStage(entity).emoji + ' ' + getStage(entity).label"></span>
                          </div>
                        </div>
                      </div>

                      <!-- ============================================================
                 Stage-specific body
                 ============================================================ -->

                      <!-- ---- AWAITING INPUT ---- -->
                      <template x-if="getStage(entity).id === 'awaiting_input'">
                        <div>

                          <!-- Summary + Recommendation -->
                          <div class="px-4 py-3 border-b border-gray-800/40">
                            <p class="text-sm font-semibold text-white" x-text="entity.summary?.headline || ''"></p>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-3"
                              x-text="entity.summary?.description || entity.summary?.text?.replace(/^.*\n+/, '').trim() || ''">
                            </p>
                            <!-- Recommendation chip -->
                            <div class="flex items-center flex-wrap gap-2 mt-2">
                              <span
                                :class="'px-2 py-0.5 rounded text-xs font-medium ' + recChipClass(entity.recommendation?.operations)"
                                x-text="entity.recommendation?.operations || ''"></span>
                              <span class="text-xs text-gray-500">
                                <span class="inline-flex items-center gap-1.5 align-middle">
                                  <span class="inline-block rounded-sm overflow-hidden align-middle"
                                    style="width:50px;height:8px;background:#1f2937">
                                    <span class="block h-full rounded-sm"
                                      :style="{ width: (entity.recommendation?.confidence || 0) + '%', background: confMeterColor(entity.recommendation?.confidence) }"></span>
                                  </span>
                                  <span x-text="`${entity.recommendation?.confidence || '?'}%`"></span>
                                </span>
                              </span>
                              <span x-show="entity.recommendation?.ref" class="text-xs text-gray-600"
                                x-text="entity.recommendation?.ref || ''"></span>
                            </div>
                          </div>

                          <!-- Triage form -->
                          <div class="px-4 py-3" x-data="{}">

                            <!-- Submitted feedback -->
                            <template x-if="getForm(entity.id).submitted">
                              <div class="submitted-success text-center py-5 text-green-400 text-sm font-medium">
                                ✅ Submitted! Waiting for agent to pick up…
                              </div>
                            </template>

                            <template x-if="!getForm(entity.id).submitted">
                              <div>

                                <!-- Quick-action button row -->
                                <div class="flex flex-wrap gap-2 mb-3">
                                  <button @click.stop="quickAction(entity.id, 'proceed')"
                                    class="btn-proceed flex items-center gap-1 px-3 py-1.5 text-xs font-bold"
                                    title="Keyboard: p">✅ Proceed</button>

                                  <button @click.stop="quickAction(entity.id, 'skip')"
                                    class="btn-secondary flex items-center gap-1 px-3 py-1.5 text-xs"
                                    title="Keyboard: s">⏭️
                                    Skip</button>

                                  <button @click.stop="quickAction(entity.id, 'archive')"
                                    class="btn-archive flex items-center gap-1 px-3 py-1.5 text-xs">📦
                                    Archive</button>

                                  <button @click.stop="quickAction(entity.id, 'delete')"
                                    class="btn-danger flex items-center gap-1 px-3 py-1.5 text-xs">🗑️ Delete</button>

                                  <button
                                    @click.stop="getForm(entity.id).showMove = !getForm(entity.id).showMove; getForm(entity.id).showNotice = false"
                                    class="btn-move flex items-center gap-1 px-3 py-1.5 text-xs"
                                    :class="{ 'brightness-125': getForm(entity.id).showMove }">📁
                                    Move…</button>

                                  <button
                                    @click.stop="getForm(entity.id).showNotice = !getForm(entity.id).showNotice; getForm(entity.id).showMove = false"
                                    class="btn-secondary flex items-center gap-1 px-3 py-1.5 text-xs"
                                    :class="{ 'bg-indigo-900/60 border-indigo-600/60 text-indigo-300': getForm(entity.id).showNotice }">📢
                                    Notice</button>
                                </div>

                                <!-- Move destination -->
                                <div x-show="getForm(entity.id).showMove" x-transition class="mb-3">
                                  <div class="flex gap-2">
                                    <select x-model="getForm(entity.id).destination" @click.stop
                                      class="form-input flex-1">
                                      <option value="">Choose folder…</option>
                                      <template x-for="dest in destinations" :key="dest">
                                        <option :value="dest" x-text="dest"></option>
                                      </template>
                                    </select>
                                    <button @click.stop="moveAction(entity.id)"
                                      :disabled="!getForm(entity.id).destination"
                                      class="btn-proceed px-3 py-1.5 text-xs disabled:opacity-40">Move</button>
                                  </div>
                                </div>

                                <!-- Notice fields (initially hidden) -->
                                <div x-show="getForm(entity.id).showNotice" x-transition
                                  class="mb-3 space-y-2 p-3 bg-gray-800/40 rounded-lg border border-gray-700/40">
                                  <p class="text-xs text-gray-500 font-medium">📢 Notice — out-of-band operator digest
                                  </p>
                                  <div>
                                    <label class="text-xs text-gray-400 block mb-1">
                                      <code class="text-indigo-400">notice_capture</code>
                                      <span class="text-gray-600 ml-1">— what to capture from this email</span>
                                    </label>
                                    <input type="text" x-model="getForm(entity.id).notice_capture" @click.stop
                                      placeholder="e.g. bill due date, amount owed…" class="form-input w-full">
                                  </div>
                                  <div>
                                    <label class="text-xs text-gray-400 block mb-1">
                                      <code class="text-indigo-400">notice_display</code>
                                      <span class="text-gray-600 ml-1">— how to present it in the toaster</span>
                                    </label>
                                    <input type="text" x-model="getForm(entity.id).notice_display" @click.stop
                                      placeholder="e.g. 'Chase bill due {date} — min payment {amount}'"
                                      class="form-input w-full">
                                  </div>
                                </div>

                                <!-- Instruction input -->
                                <div class="mb-2">
                                  <label class="text-xs text-gray-500 block mb-1">
                                    Instruction
                                    <span class="text-gray-700 ml-1">— proceed · skip · delete · custom Gmail
                                      command</span>
                                  </label>
                                  <input type="text" x-model="getForm(entity.id).instruction" @click.stop
                                    @keydown.enter.prevent="submitTriage(entity.id)"
                                    @keydown.escape.prevent="quickAction(entity.id, 'skip')"
                                    placeholder="proceed, skip, or custom instruction…" class="form-input w-full">
                                </div>

                                <!-- Rationale input -->
                                <div class="mb-3">
                                  <label class="text-xs text-gray-500 block mb-1">
                                    Rationale
                                    <span class="text-gray-700 ml-1">— optional · seeds training signal</span>
                                  </label>
                                  <input type="text" x-model="getForm(entity.id).rationale" @click.stop
                                    @keydown.enter.prevent="submitTriage(entity.id)" placeholder="Why? (1–2 sentences)"
                                    :data-rationale-for="entity.id" class="form-input w-full">
                                </div>

                                <!-- Submit button -->
                                <button @click.stop="submitTriage(entity.id)"
                                  :disabled="!getForm(entity.id).instruction || getForm(entity.id).submitting"
                                  class="btn-proceed w-full py-2 text-sm">
                                  <span x-text="getForm(entity.id).submitting ? '⏳ Submitting…' : '▶ Submit'"></span>
                                </button>

                                <!-- Validation / error message -->
                                <div x-show="getForm(entity.id).error"
                                  class="mt-2 text-red-400 text-xs form-error-shake" x-text="getForm(entity.id).error">
                                </div>

                              </div>
                            </template>

                          </div>
                        </div>
                      </template>

                      <!-- ---- AWAITING APPROVAL ---- -->
                      <template x-if="getStage(entity).id === 'awaiting_approval'">
                        <div>
                          <!-- Summary strip -->
                          <div class="px-4 py-3 border-b border-gray-800/40">
                            <p class="text-sm font-semibold text-white" x-text="entity.summary?.headline || ''"></p>
                            <div class="flex items-center gap-2 mt-1 flex-wrap">
                              <span
                                :class="'px-2 py-0.5 rounded text-xs font-medium ' + recChipClass(entity.recommendation?.operations)"
                                x-text="entity.recommendation?.operations || ''"></span>
                              <span class="text-xs text-gray-500">
                                <span class="inline-flex items-center gap-1.5 align-middle">
                                  <span class="inline-block rounded-sm overflow-hidden align-middle"
                                    style="width:50px;height:8px;background:#1f2937">
                                    <span class="block h-full rounded-sm"
                                      :style="{ width: (entity.recommendation?.confidence || 0) + '%', background: confMeterColor(entity.recommendation?.confidence) }"></span>
                                  </span>
                                  <span x-text="`${entity.recommendation?.confidence || '?'}%`"></span>
                                </span>
                              </span>
                            </div>
                          </div>

                          <!-- Plan text (hidden once approved) -->
                          <div x-show="!getForm(entity.id).approving" class="px-4 py-3 border-b border-gray-800/40">
                            <p class="text-xs text-gray-500 font-medium mb-2">📋 Pending Mutation Plan</p>
                            <pre class="plan-text" x-text="stripAnsi(entity.plan?.text || '')"></pre>
                          </div>

                          <!-- Approve / Reject -->
                          <div class="px-4 py-3 flex gap-3">
                            <template x-if="getForm(entity.id).approving">
                              <div class="flex items-center gap-2 text-sm text-blue-400 py-1">
                                <div class="spinner" style="border-top-color: #60a5fa; border-color: #1e3a5f;"></div>
                                <span>Waiting for backend to begin applying…</span>
                              </div>
                            </template>
                            <template x-if="!getForm(entity.id).approving">
                              <div class="flex gap-3 w-full">
                                <button @click.stop="approveEntity(entity.id)"
                                  class="btn-proceed flex-1 py-2.5 text-sm font-bold" title="Keyboard: a">✅ Approve
                                  &amp;
                                  Apply</button>
                                <button @click.stop="rejectEntity(entity.id)"
                                  class="btn-secondary flex-1 py-2.5 text-sm">↩️
                                  Reject
                                  / Re-process</button>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>

                      <!-- ---- SKIPPED ---- -->
                      <template x-if="getStage(entity).id === 'skipped'">
                        <div>
                          <div class="px-4 py-3 border-b border-gray-800/40">
                            <p class="text-sm font-semibold text-white" x-text="entity.summary?.headline || ''"></p>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2"
                              x-text="entity.summary?.description || entity.summary?.text?.replace(/^.*\n+/, '').trim() || ''">
                            </p>
                          </div>
                          <div class="px-4 py-3 space-y-3">
                            <p class="text-sm text-gray-500 text-center">This email was marked to skip.</p>
                            <button @click.stop="unskipEntity(entity.id)" class="btn-secondary w-full py-2 text-sm">↩️
                              Re-process</button>
                          </div>
                        </div>
                      </template>

                      <!-- ---- PROCESSING / EXECUTING ---- -->
                      <template x-if="getStage(entity).id === 'processing'">
                        <div class="px-4 py-3">
                          <div class="flex items-center gap-2 text-sm text-gray-400">
                            <div class="spinner"></div>
                            <span>Agent is processing…</span>
                          </div>
                          <div x-show="entity.operator?.command" class="mt-1.5 text-xs text-gray-600">
                            Command: <code class="text-gray-500" x-text="entity.operator?.command"></code>
                          </div>
                          <div x-show="entity.execution?.summary" class="mt-1 text-xs text-gray-500 line-clamp-2"
                            x-text="entity.execution?.summary"></div>
                        </div>
                      </template>

                      <!-- ---- APPLYING ---- -->
                      <template x-if="getStage(entity).id === 'applying'">
                        <div class="px-4 py-3">
                          <div class="flex items-center gap-2 text-sm text-blue-400">
                            <div class="spinner" style="border-top-color: #60a5fa; border-color: #1e3a5f;"></div>
                            <span>Applying mutations to Gmail…</span>
                          </div>
                        </div>
                      </template>

                      <!-- ---- DONE ---- -->
                      <template x-if="getStage(entity).id === 'done'">
                        <div class="px-4 py-3">
                          <div class="flex items-center gap-2 text-sm text-green-400">
                            <span>✅ Applied</span>
                            <span class="text-gray-600 text-xs" x-text="formatDate(entity.apply?.applied_at)"></span>
                          </div>
                          <div x-show="entity.journal?.action_taken" class="mt-1 text-xs text-gray-500"
                            x-text="entity.journal?.action_taken"></div>
                        </div>
                      </template>

                      <!-- ---- OTHER STAGES (new / loading / analyzing / recommended) ---- -->
                      <template
                        x-if="!['awaiting_input','awaiting_approval','processing','applying','done','skipped'].includes(getStage(entity).id)">
                        <div class="px-4 py-3">
                          <div class="flex items-center gap-2 text-xs text-gray-500">
                            <div class="w-2 h-2 rounded-full ws-dot-pulse"
                              :style="`background-color: ${stageColor(getStage(entity).id)}`"></div>
                            <span>Pipeline running…</span>
                          </div>
                        </div>
                      </template>

                      <!-- ============================================================
                 Expandable detail row
                 ============================================================ -->
                      <div class="border-t border-gray-800/40" x-data="{ open: false, copied: false }">
                        <button @click.stop="open = !open"
                          class="w-full px-4 py-2 text-xs text-gray-600 hover:text-gray-400 flex items-center justify-between transition-colors group">
                          <span x-text="open ? '▲ Hide details' : '▾ View details'"
                            class="group-hover:text-gray-300"></span>
                          <span
                            @click.stop="navigator.clipboard.writeText(entity.id).then(() => { copied = true; setTimeout(() => copied = false, 1500) })"
                            class="flex items-center gap-1 cursor-pointer hover:text-gray-300 transition-colors"
                            :title="copied ? 'Copied!' : 'Copy ID'">
                            <i x-show="!copied" class="ph-bold ph-clipboard text-gray-600 group-hover:text-gray-400"
                              aria-hidden="true"></i>
                            <i x-show="copied" class="ph-bold ph-check text-green-500" aria-hidden="true"></i>
                            <code class="font-mono text-gray-600 group-hover:text-gray-400" x-text="entity.id"></code>
                          </span>
                        </button>

                        <div x-show="open" x-transition class="px-4 pb-4">
                          <div class="space-y-0.5 text-xs font-mono">
                            <template x-for="[k, v] in Object.entries(entitySummaryFields(entity))" :key="k">
                              <div class="flex gap-2 min-w-0">
                                <span class="text-gray-600 flex-shrink-0 w-32 text-right" x-text="k + ':'"></span>
                                <span class="text-gray-400 truncate"
                                  :title="typeof v === 'object' ? JSON.stringify(v) : String(v ?? '')"
                                  x-text="typeof v === 'object' ? JSON.stringify(v).slice(0, 120) : String(v ?? '').slice(0, 120)"></span>
                              </div>
                            </template>
                          </div>
                        </div>
                      </div>
                    </div>

                  </article>
                </div>
              </template>

              <!-- Empty slot placeholder -->
              <template x-if="!slot.entityId">
                <div class="rounded-xl border border-dashed border-gray-800/20" style="min-height:480px"
                  x-transition:enter="transition-opacity duration-500" x-transition:enter-start="opacity-0"
                  x-transition:enter-end="opacity-100"></div>
              </template>

            </div>
          </template>

          <!-- Bottom padding -->
          <div class="h-16"></div>

        </div>
      </div>

      <!-- ================================================================
         Operator History (training view)
         ================================================================ -->
      <div class="flex-1 overflow-auto px-6 py-6" x-show="view === 'operator-history'">
        <h2 class="text-lg font-bold text-white mb-4">
          📋 Operator History
          <span class="text-sm font-normal text-gray-500 ml-1" x-show="!archiveLoading"
            x-text="'(' + archiveEntries.length + ')'"></span>
        </h2>

        <!-- Loading -->
        <template x-if="archiveLoading">
          <div class="text-gray-500 text-sm">Loading archive…</div>
        </template>

        <!-- Empty (after filter/search) -->
        <template x-if="!archiveLoading && archiveEntries.length > 0 && sortedArchiveEntries.length === 0">
          <div class="text-gray-500 text-sm mt-2">No rows match the current filters.</div>
        </template>

        <!-- Search + Filters -->
        <template x-if="!archiveLoading && archiveEntries.length > 0">
          <div class="flex flex-wrap gap-3 mb-4">

            <input type="text" x-model="archiveSearch" placeholder="Search…"

            <!-- Execution instruction dropdown -->

              <option value="">All instructions</option>
              <template x-for="opt in archiveInstructionOptions" :key="opt">
                <option :value="opt" x-text="opt"></option>
              </template>
            </select>
            <!-- Clear button -->
            <button @click="archiveSearch = ''; archiveFilterInstruction = ''"
              class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs rounded px-3 py-1.5 focus:outline-none">Clear</button>
            <!-- Row count -->
            <span class="text-gray-600 text-xs self-center"
              x-text="sortedArchiveEntries.length + ' / ' + archiveEntries.length + ' rows'"></span>
          </div>
        </template>

        <!-- Table -->
        <template x-if="!archiveLoading && archiveEntries.length > 0">
          <div class="overflow-x-auto rounded-lg border border-gray-800">
            <table class="w-full text-xs text-gray-300 border-collapse">
              <thead>
                <tr class="bg-gray-800/80 text-gray-400 uppercase tracking-wide">
                  <th @click="archiveSortBy('id')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    ID <span x-text="archiveSortIcon('id')"></span></th>
                  <th @click="archiveSortBy('envelope.from')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    From <span x-text="archiveSortIcon('envelope.from')"></span></th>
                  <th @click="archiveSortBy('apply.applied_at')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Applied <span x-text="archiveSortIcon('apply.applied_at')"></span></th>
                  <th @click="archiveSortBy('summary.headline')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Headline <span x-text="archiveSortIcon('summary.headline')"></span></th>
                  <th @click="archiveSortBy('summary.description')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Description <span x-text="archiveSortIcon('summary.description')"></span></th>
                  <th @click="archiveSortBy('recommendation.journal_id')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Journal ID <span x-text="archiveSortIcon('recommendation.journal_id')"></span></th>
                  <th @click="archiveSortBy('journal_meta.confirmed_count')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Confirms <span x-text="archiveSortIcon('journal_meta.confirmed_count')"></span></th>
                  <th @click="archiveSortBy('recommendation.operations')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Rec. Ops <span x-text="archiveSortIcon('recommendation.operations')"></span></th>
                  <th @click="archiveSortBy('recommendation.confidence')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Conf <span x-text="archiveSortIcon('recommendation.confidence')"></span></th>
                  <th @click="archiveSortBy('execution.instruction')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Instruction <span x-text="archiveSortIcon('execution.instruction')"></span></th>
                  <th class="px-3 py-2 text-left select-none whitespace-nowrap text-gray-400">Actions</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="entry in sortedArchiveEntries" :key="entry.id">
                  <tr class="border-t border-gray-800 hover:bg-gray-800/40 transition-colors">
                    <!-- ID (click to copy) -->
                    <td class="px-3 py-2 font-mono whitespace-nowrap">
                      <button @click="copyArchiveId(entry.id)"
                        class="text-gray-500 hover:text-indigo-400 transition-colors flex items-center gap-1"
                        :title="archiveCopied === entry.id ? 'Copied!' : 'Copy ID'">
                        <i x-show="archiveCopied !== entry.id" class="ph-bold ph-clipboard text-xs"
                          aria-hidden="true"></i>
                        <i x-show="archiveCopied === entry.id" class="ph-bold ph-check text-green-400 text-xs"
                          aria-hidden="true"></i>
                        <span x-text="entry.id"></span>
                      </button>
                    </td>
                    <!-- From -->
                    <td class="px-3 py-2 max-w-[180px] truncate" x-text="entry.envelope?.from || '—'"></td>
                    <!-- Applied at (relative) -->
                    <td class="px-3 py-2 whitespace-nowrap text-gray-500" :title="entry.apply?.applied_at || ''"
                      x-text="relativeTime(entry.apply?.applied_at)"></td>
                    <!-- Headline -->
                    <td class="px-3 py-2 max-w-[220px] truncate" x-text="entry.summary?.headline || '—'"></td>
                    <!-- Description -->
                    <td class="px-3 py-2 max-w-[260px] truncate text-gray-500"
                      x-text="entry.summary?.description || entry.summary?.text?.replace(/^.*\n+/, '').trim() || '—'">
                    </td> <!-- Journal ID -->
                    <td class="px-3 py-2 whitespace-nowrap text-gray-500 font-mono text-xs"
                      x-text="entry.recommendation?.journal_id != null ? entry.recommendation.journal_id : '\u2014'">
                    </td>
                    <!-- Confirms -->
                    <td class="px-3 py-2 whitespace-nowrap" :title="archiveConfirmTooltip(entry)">
                      <template x-if="entry.journal_meta?.confirmed_count != null">
                        <span :class="'inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold ' +
                          (entry.journal_meta.confirmed_count >= 10 ? 'bg-green-900/60 text-green-300' :
                           entry.journal_meta.confirmed_count >= 3  ? 'bg-yellow-900/60 text-yellow-300' :
                           entry.journal_meta.confirmed_count >= 1  ? 'bg-gray-700 text-gray-300' :
                                                                       'bg-gray-800 text-gray-600')"
                          x-text="entry.journal_meta.confirmed_count"></span>
                      </template>
                      <template x-if="entry.journal_meta?.confirmed_count == null">
                        <span class="text-gray-700">—</span>
                      </template>
                    </td> <!-- Rec. Operations (tooltip = rationale) -->
                    <td class="px-3 py-2 whitespace-nowrap" :title="entry.recommendation?.rationale || ''">
                      <span
                        :class="'px-2 py-0.5 rounded text-xs font-medium ' + recChipClass(entry.recommendation?.operations)"
                        x-text="entry.recommendation?.operations || '—'"></span>
                    </td>
                    <!-- Confidence (meter) -->
                    <td class="px-3 py-2 whitespace-nowrap">
                      <template x-if="entry.recommendation?.confidence != null">
                        <span class="inline-flex items-center gap-1.5">
                          <span class="inline-block rounded-sm overflow-hidden align-middle"
                            style="width:40px;height:7px;background:#1f2937">
                            <span class="block h-full rounded-sm"
                              :style="{ width: entry.recommendation.confidence + '%', background: confMeterColor(entry.recommendation.confidence) }"></span>
                          </span>
                          <span class="text-gray-400 text-xs" x-text="entry.recommendation.confidence + '%'"></span>
                        </span>
                      </template>
                      <template x-if="entry.recommendation?.confidence == null">
                        <span class="text-gray-700">—</span>
                      </template>
                    </td>
                    <!-- Instruction (_parsed_operation, tooltip = operator_input.instruction) -->
                    <td class="px-3 py-2 whitespace-nowrap" :title="entry.operator_input?.instruction || ''">
                      <span
                        :class="'px-2 py-0.5 rounded text-xs font-medium ' + recChipClass(entry.operator_input?._parsed_operation)"
                        x-text="entry.operator_input?._parsed_operation || '—'"></span>
                    </td> <!-- Actions -->
                    <td class="px-3 py-2 whitespace-nowrap">
                      <button @click="confirmArchiveDelete(entry.id)" title="Delete from archive"
                        class="text-gray-600 hover:text-red-400 transition-colors">
                        <i class="ph-bold ph-trash text-sm" aria-hidden="true"></i>
                      </button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>

        <!-- Delete confirmation modal -->
        <template x-if="archiveDeleteId">
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60">
            <div class="bg-gray-900 border border-gray-700 rounded-xl px-6 py-5 shadow-2xl max-w-sm w-full mx-4">
              <h3 class="text-white font-semibold text-sm mb-2">Delete archived entry?</h3>
              <p class="text-gray-400 text-xs mb-4">
                This will permanently delete
                <span class="font-mono text-gray-300" x-text="archiveDeleteId"></span>
                from the archive folder. This cannot be undone.
              </p>
              <div class="flex justify-end gap-2">
                <button @click="cancelArchiveDelete()"
                  class="px-3 py-1.5 text-xs rounded bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors">
                  Cancel
                </button>
                <button @click="deleteArchiveEntry()"
                  class="px-3 py-1.5 text-xs rounded bg-red-900 border border-red-700 text-red-200 hover:bg-red-800 transition-colors font-semibold">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
      <!-- ================================================================
         Trial History (training view)
         ================================================================ -->
      <div class="flex-1 overflow-auto px-6 py-6" x-show="view === 'trial-history'">
        <h2 class="text-lg font-bold text-white mb-4">
          🧪 Trial History
          <span class="text-sm font-normal text-gray-500 ml-1" x-show="!trialLoading"
            x-text="'(' + trialEntries.length + ')'"></span>
        </h2>

        <!-- Loading -->
        <template x-if="trialLoading">
          <div class="text-gray-500 text-sm">Loading trials…</div>
        </template>

        <!-- Empty -->
        <template x-if="!trialLoading && trialEntries.length === 0">
          <div class="text-gray-500 text-sm mt-2">No trial report-cards found.</div>
        </template>

        <!-- Bar chart -->
        <template x-if="!trialLoading && trialChartEntries.length > 0">
          <div class="mb-5 bg-gray-900/60 border border-gray-800 rounded-lg px-4 pt-3 pb-0">
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs text-gray-600 uppercase tracking-widest"
                x-text="trialChartLabel + ' per Trial'"></span>
              <span class="text-xs text-gray-700 font-mono" x-text="'max: ' + maxTrialChartVal"></span>
            </div>
            <!-- Chart area -->
            <div class="relative" style="height: 80px">
              <!-- Grid lines -->
              <div class="absolute inset-x-0 top-0 border-t border-gray-800/50 pointer-events-none"></div>
              <div class="absolute inset-x-0 border-t border-gray-800/40 pointer-events-none" style="top:25%"></div>
              <div class="absolute inset-x-0 border-t border-gray-800/40 pointer-events-none" style="top:50%"></div>
              <div class="absolute inset-x-0 border-t border-gray-800/40 pointer-events-none" style="top:75%"></div>
              <div class="absolute inset-x-0 bottom-0 border-t border-gray-700 pointer-events-none"></div>
              <!-- Bars -->
              <div class="absolute inset-0 flex items-end gap-px">
                <template x-for="trial in trialChartEntries" :key="trial.id">
                  <div class="flex-1 relative group" style="min-width:0">
                    <!-- Hover tooltip -->
                    <div
                      class="hidden group-hover:block absolute bottom-full left-1/2 -translate-x-1/2 mb-1 z-10 bg-gray-800 border border-gray-700 text-xs text-gray-200 px-2 py-1 rounded whitespace-nowrap pointer-events-none"
                      x-text="trialChartTooltip(trial)">
                    </div>
                    <div class="w-full bg-indigo-600 hover:bg-indigo-500 transition-colors"
                      :style="{ height: (_trialChartVal(trial, trialChartMetric) / maxTrialChartVal * 80) + 'px' }">
                    </div>
                  </div>
                </template>
              </div>
            </div>
            <!-- X-axis labels -->
            <div class="flex gap-px pt-1 pb-2">
              <template x-for="trial in trialChartEntries" :key="trial.id">
                <div class="flex-1 text-center text-gray-700 overflow-hidden"
                  style="font-size:9px;font-family:monospace" x-text="trial.id"></div>
              </template>
            </div>
          </div>
        </template>

        <!-- Table -->
        <template x-if="!trialLoading && trialEntries.length > 0">
          <div class="overflow-x-auto rounded-lg border border-gray-800">
            <table class="w-full text-xs text-gray-300 border-collapse">
              <thead>
                <tr class="bg-gray-800/80 text-gray-400 uppercase tracking-wide">
                  <th @click="trialSortBy('id')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Trial ID <span x-text="trialSortIcon('id')"></span></th>
                  <th @click="trialSortBy('date')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Date <span x-text="trialSortIcon('date')"></span></th>
                  <th @click="trialSortBy('duration')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Duration <span x-text="trialSortIcon('duration')"></span>
                    <button @click.stop="setTrialChartMetric('duration')" title="Plot Duration in chart"
                      :class="trialChartMetric === 'duration' ? 'text-indigo-400' : 'text-gray-700 hover:text-gray-400'"
                      class="ml-1 transition-colors align-middle">
                      <i class="ph-bold ph-chart-bar text-xs" aria-hidden="true"></i>
                    </button>
                  </th>
                  <th @click="trialSortBy('passing')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Passing <span x-text="trialSortIcon('passing')"></span>
                    <button @click.stop="setTrialChartMetric('passing')" title="Plot Passing in chart"
                      :class="trialChartMetric === 'passing' ? 'text-indigo-400' : 'text-gray-700 hover:text-gray-400'"
                      class="ml-1 transition-colors align-middle">
                      <i class="ph-bold ph-chart-bar text-xs" aria-hidden="true"></i>
                    </button>
                  </th>
                  <th @click="trialSortBy('total')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Total <span x-text="trialSortIcon('total')"></span>
                    <button @click.stop="setTrialChartMetric('total')" title="Plot Total in chart"
                      :class="trialChartMetric === 'total' ? 'text-indigo-400' : 'text-gray-700 hover:text-gray-400'"
                      class="ml-1 transition-colors align-middle">
                      <i class="ph-bold ph-chart-bar text-xs" aria-hidden="true"></i>
                    </button>
                  </th>
                  <th @click="trialSortBy('score')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Score <span x-text="trialSortIcon('score')"></span>
                    <button @click.stop="setTrialChartMetric('score')" title="Plot Score in chart"
                      :class="trialChartMetric === 'score' ? 'text-indigo-400' : 'text-gray-700 hover:text-gray-400'"
                      class="ml-1 transition-colors align-middle">
                      <i class="ph-bold ph-chart-bar text-xs" aria-hidden="true"></i>
                    </button>
                  </th>
                  <th @click="trialSortBy('grade')"
                    class="px-3 py-2 text-left cursor-pointer select-none whitespace-nowrap hover:text-gray-200">
                    Grade <span x-text="trialSortIcon('grade')"></span>
                    <button @click.stop="setTrialChartMetric('grade')" title="Plot Grade in chart"
                      :class="trialChartMetric === 'grade' ? 'text-indigo-400' : 'text-gray-700 hover:text-gray-400'"
                      class="ml-1 transition-colors align-middle">
                      <i class="ph-bold ph-chart-bar text-xs" aria-hidden="true"></i>
                    </button>
                  </th>
                  <th class="px-3 py-2 text-left select-none whitespace-nowrap text-gray-400">Actions</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="trial in sortedTrialEntries" :key="trial.id">
                  <tr class="border-t border-gray-800 hover:bg-gray-800/40 transition-colors">
                    <!-- Trial ID (click to copy) -->
                    <td class="px-3 py-2 font-mono whitespace-nowrap">
                      <button @click="copyTrialId(trial.id)"
                        class="text-gray-500 hover:text-indigo-400 transition-colors flex items-center gap-1"
                        :title="trialCopied === trial.id ? 'Copied!' : 'Copy ID'">
                        <i x-show="trialCopied !== trial.id" class="ph-bold ph-clipboard text-xs"
                          aria-hidden="true"></i>
                        <i x-show="trialCopied === trial.id" class="ph-bold ph-check text-green-400 text-xs"
                          aria-hidden="true"></i>
                        <span x-text="trial.id"></span>
                      </button>
                    </td>
                    <!-- Date -->
                    <td class="px-3 py-2 whitespace-nowrap text-gray-500"
                      :title="trial.date ? new Date(trial.date).toLocaleString() : ''"
                      x-text="relativeTime(trial.date)"></td>

                    <td class="px-3 py-2 whitespace-nowrap text-gray-500"
                      :title="trial.duration_ms != null ? durationRelative(trial.duration_ms) + ' total run time' : 'No duration data'"

                    <!-- Passing -->
                    <td class="px-3 py-2 whitespace-nowrap font-mono"
                      x-text="trial.passing != null ? trial.passing : '\u2014'"></td>
                    <!-- Total -->
                    <td class="px-3 py-2 whitespace-nowrap font-mono text-gray-500"
                      x-text="trial.total != null ? trial.total : '\u2014'"></td>
                    <!-- Score (meter) -->
                    <td class="px-3 py-2 whitespace-nowrap">
                      <template x-if="trial.score != null">
                        <span class="inline-flex items-center gap-1.5">
                          <span class="inline-block rounded-sm overflow-hidden align-middle"
                            style="width:40px;height:7px;background:#1f2937">
                            <span class="block h-full rounded-sm"
                              :style="{ width: trial.score + '%', background: confMeterColor(trial.score) }"></span>
                          </span>
                          <span class="text-gray-400 text-xs" x-text="trial.score + '%'"></span>
                        </span>
                      </template>
                      <template x-if="trial.score == null">
                        <span class="text-gray-700">—</span>
                      </template>
                    </td>
                    <!-- Grade -->
                    <td class="px-3 py-2 whitespace-nowrap font-bold" :class="trialGradeColor(trial.grade)"
                      x-text="trial.grade ?? '\u2014'"></td>
                    <!-- Actions -->
                    <td class="px-3 py-2 whitespace-nowrap flex items-center gap-2">
                      <button @click="confirmTrialPromote(trial.id)" title="Promote trial → personal-email"
                        class="text-gray-600 hover:text-indigo-400 transition-colors">
                        <i class="ph-bold ph-arrow-circle-up text-sm" aria-hidden="true"></i>
                      </button>
                      <button @click="confirmTrialDelete(trial.id)" title="Delete trial folder"
                        class="text-gray-600 hover:text-red-400 transition-colors">
                        <i class="ph-bold ph-trash text-sm" aria-hidden="true"></i>
                      </button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>

        <!-- Delete confirmation modal -->
        <template x-if="trialDeleteId">
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60">
            <div class="bg-gray-900 border border-gray-700 rounded-xl px-6 py-5 shadow-2xl max-w-sm w-full mx-4">
              <h3 class="text-white font-semibold text-sm mb-2">Delete trial folder?</h3>
              <p class="text-gray-400 text-xs mb-4">
                This will permanently delete trial
                <span class="font-mono text-gray-300" x-text="trialDeleteId"></span>
                and all its contents from disk. This cannot be undone.
              </p>
              <div class="flex justify-end gap-2">
                <button @click="cancelTrialDelete()"
                  class="px-3 py-1.5 text-xs rounded bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors">
                  Cancel
                </button>
                <button @click="deleteTrialEntry()"
                  class="px-3 py-1.5 text-xs rounded bg-red-900 border border-red-700 text-red-200 hover:bg-red-800 transition-colors font-semibold">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </template>

        <!-- Promote confirmation modal -->
        <template x-if="trialPromoteId">
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60">
            <div class="bg-gray-900 border border-gray-700 rounded-xl px-6 py-5 shadow-2xl max-w-md w-full mx-4">
              <h3 class="text-white font-semibold text-sm mb-2">Promote trial to personal-email?</h3>
              <p class="text-gray-400 text-xs mb-1">
                This will run <span class="font-mono text-gray-300">bun trial-runner/agent.coffee --promote
                  <span x-text="trialPromoteId"></span></span>,
                backing up and merging this trial's journal into <span
                  class="font-mono text-gray-300">personal-email/db/</span>.
              </p>
              <!-- Result output -->
              <template x-if="trialPromoteResult">
                <div class="mt-3 mb-2">
                  <template x-if="trialPromoteResult.ok">
                    <div class="text-green-400 text-xs font-semibold">✓ Promoted successfully.</div>
                  </template>
                  <template x-if="!trialPromoteResult.ok">
                    <div>
                      <div class="text-red-400 text-xs font-semibold mb-1">✗ Promote failed.</div>
                      <pre
                        class="text-red-300 text-xs bg-gray-800 rounded p-2 overflow-auto max-h-32 whitespace-pre-wrap"
                        x-text="trialPromoteResult.error"></pre>
                    </div>
                  </template>
                </div>
              </template>
              <div class="flex justify-end gap-2 mt-4">
                <button @click="cancelTrialPromote()" :disabled="trialPromoting"
                  class="px-3 py-1.5 text-xs rounded bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors disabled:opacity-50">
                  Cancel
                </button>
                <button @click="promoteTrialEntry()" :disabled="trialPromoting || trialPromoteResult?.ok"
                  class="px-3 py-1.5 text-xs rounded bg-indigo-900 border border-indigo-700 text-indigo-200 hover:bg-indigo-800 transition-colors font-semibold disabled:opacity-50 flex items-center gap-1.5">
                  <template x-if="trialPromoting">
                    <span>Promoting…</span>
                  </template>
                  <template x-if="!trialPromoting">
                    <span>Promote</span>
                  </template>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
  </div>

</body>

</html>
